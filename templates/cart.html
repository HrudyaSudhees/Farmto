<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Farmto</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/Images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Playfair+Display:wght@700&family=Squada+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-left">
            <img src="/static/Images/logo.png" alt="Farmto Logo" class="nav-logo">
            <a href="/" class="nav-brand">FARMTO</a>
        </div>
        <div class="nav-center squada-one-regular">
            <a href="/">Home</a>
            <a href="/shop">Shop</a>
        </div>
        <div class="nav-right">
            <a href="/get-help" class="help-link">Get Help</a>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search">
            </div>
            <a href="/cart" class="cart-link">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </a>
        </div>
    </nav>

    <main>
        <section class="page-header">
            <h1>Your Shopping Cart</h1>
        </section>

        <section class="cart-container">
            <div id="cart-items-container">
                </div>
            <div class="cart-summary">
                <h3>Total: <span id="cart-total">₹0</span></h3>
                <button class="cta-button">Proceed to Checkout</button>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">
            <h2 class="brand-name-large">FARMTO</h2>
            <p class="copyright">© 2025 by Farmto.</p>
        </div>
    </footer>
    <script src="/static/script.js"></script>
</body>
</html>
